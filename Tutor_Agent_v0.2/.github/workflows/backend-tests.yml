name: Backend Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ["3.12"]
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          uv sync
      
      - name: Run linting (ruff)
        working-directory: ./backend
        run: |
          uv run ruff check app tests
      
      - name: Run type checking (ruff format check)
        working-directory: ./backend
        run: |
          uv run ruff format --check app tests
      
      - name: Run unit tests
        working-directory: ./backend
        run: |
          uv run pytest tests/unit -v --tb=short
      
      - name: Run integration tests
        working-directory: ./backend
        run: |
          uv run pytest tests/integration -v --tb=short
      
      - name: Run contract tests
        working-directory: ./backend
        run: |
          uv run pytest tests/contract -v --tb=short
      
      - name: Run tests with coverage
        working-directory: ./backend
        run: |
          uv run pytest --cov=app --cov-report=xml --cov-report=term
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: backend
          name: backend-coverage
  
  playwright:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      
      - name: Install dependencies
        working-directory: ./backend
        run: |
          uv sync
      
      - name: Install Playwright browsers
        working-directory: ./backend
        run: |
          uv run playwright install --with-deps chromium
      
      - name: Run Playwright E2E tests
        working-directory: ./backend
        run: |
          uv run pytest tests/e2e -v --tb=short -m playwright
        continue-on-error: true  # Optional until frontend is ready
      
      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: backend/playwright-report/
          retention-days: 30

