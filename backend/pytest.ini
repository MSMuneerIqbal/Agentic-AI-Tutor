[pytest]
# Pytest configuration for Tutor GPT backend

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers
markers =
    asyncio: mark test as async (using pytest-asyncio)
    playwright: mark test as Playwright E2E test
    unit: mark test as unit test
    integration: mark test as integration test
    contract: mark test as contract test
    slow: mark test as slow running

# Async settings
asyncio_mode = auto

# Output options
addopts = 
    -v
    --tb=short
    --strict-markers
    --color=yes

# Coverage settings (when using pytest-cov)
[coverage:run]
source = app
omit = 
    */tests/*
    */__init__.py
    */migrations/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod

