openapi: 3.0.3
info:
  title: Tutor GPT API
  version: 0.1.0
servers:
  - url: http://localhost:8000
paths:
  /sessions/start:
    post:
      summary: Start a new session
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  session_id:
                    type: string
  /api/v1/rag/index:
    post:
      summary: Enqueue RAG indexing job
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                docs:
                  type: array
                  items:
                    type: object
                namespace:
                  type: string
      responses:
        '202':
          description: Job accepted
  /api/v1/rag/retrieve:
    post:
      summary: Retrieve top-k chunks with citations
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: string
                k:
                  type: integer
                  default: 5
                namespace:
                  type: string
                filter:
                  type: object
      responses:
        '200':
          description: Retrieval results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      type: object
                      properties:
                        text:
                          type: string
                        title:
                          type: string
                        url:
                          type: string
                        source_type:
                          type: string
                        chunk_id:
                          type: string
